<script src="auth.js"></script>

<script>
  // Check if user is already logged in
  const session = AUTH.getSession();

  if (session) {
    // Logged in → Dashboard
    window.location.replace("dashboard.html");
  } else {
    // Not logged in → Login page
    window.location.replace("login.html");
  }
</script>
